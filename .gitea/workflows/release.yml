name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    uses: brefwiz/ci-workflows/.gitea/workflows/rust-release.yml@main
    with:
      publish-mode: multi
      crates: "api-bones api-bones-tower api-bones-reqwest"
    secrets: inherit
