name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # ==========================================================================
  # STAGE 1: Validate tag matches root Cargo.toml [package].version
  # ==========================================================================

  validate-version:
    name: Validate tag matches Cargo.toml
    runs-on: brefwiz
    container:
      image: harbor.brefwiz.com/brefwiz/ci:latest
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          PKG_VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ -z "$PKG_VERSION" ]; then
            echo "::error::Could not read version from root Cargo.toml"
            exit 1
          fi
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            if [ "$TAG" != "$PKG_VERSION" ]; then
              echo "::error::Tag '$TAG' does not match Cargo.toml version '$PKG_VERSION'"
              exit 1
            fi
          fi
          echo "Version: $PKG_VERSION"

  # ==========================================================================
  # STAGE 2: Publish crates to Forgejo registry
  # ==========================================================================

  publish-crate:
    name: Publish Crates to Forgejo Registry
    runs-on: brefwiz
    needs: [validate-version]
    container:
      image: harbor.brefwiz.com/brefwiz/ci:latest
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          save-if: false

      - name: Build
        run: cargo build --lib --release --workspace

      - name: Debug token
        env:
          CARGO_REGISTRIES_BREFWIZ_TOKEN: "Bearer ${{ secrets.PACKAGE_PUBLISHER_TOKEN }}"
        run: |
          if [ -z "$CARGO_REGISTRIES_BREFWIZ_TOKEN" ]; then
            echo "❌ PACKAGE_PUBLISHER_TOKEN secret is EMPTY or not set"
            exit 1
          else
            echo "✅ Token is present (length: ${#CARGO_REGISTRIES_BREFWIZ_TOKEN})"
          fi

      - name: Publish crates
        env:
          CARGO_REGISTRIES_BREFWIZ_TOKEN: "Bearer ${{ secrets.PACKAGE_PUBLISHER_TOKEN }}"
        run: |
          REGISTRY=$(grep -m1 '^\[registries' .cargo/config.toml | tr -d '[]' | cut -d. -f2)
          publish_one() {
            PKG=$1
            if ! cargo publish --registry "$REGISTRY" --allow-dirty --package "$PKG" 2>&1 | tee /tmp/publish.log; then
              if grep -q "already uploaded\|already exists" /tmp/publish.log; then
                echo "⚠️ $PKG already published at this version (expected)"
              else
                echo "❌ Publish failed for $PKG"
                cat /tmp/publish.log
                exit 1
              fi
            fi
          }
          publish_one api-bones
          # Give the registry a moment to index api-bones before dependents are published
          sleep 10
          publish_one api-bones-tower
          publish_one api-bones-reqwest

      - name: Summary
        if: success()
        run: |
          REGISTRY=$(grep -m1 '^\[registries' .cargo/config.toml | tr -d '[]' | cut -d. -f2)
          echo "## 📦 Crates Published" >> $GITHUB_STEP_SUMMARY
          for PKG in api-bones api-bones-tower api-bones-reqwest; do
            DIR=$([ "$PKG" = "api-bones" ] && echo "." || echo "$PKG")
            VERSION=$(grep '^version' "$DIR/Cargo.toml" | head -1 | cut -d'"' -f2)
            echo "- \`$PKG\` v\`$VERSION\` → \`$REGISTRY\`" >> $GITHUB_STEP_SUMMARY
          done

  # ==========================================================================
  # STAGE 3: Create Gitea release with changelog
  # ==========================================================================

  gitea-release:
    name: Create Gitea Release
    runs-on: brefwiz
    needs: [publish-crate]
    container:
      image: harbor.brefwiz.com/brefwiz/ci:latest
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch full history and tags
        run: |
          git fetch --unshallow --tags
      - name: Create release
        env:
          GITEA_TOKEN: ${{ secrets.PACKAGE_PUBLISHER_TOKEN }}
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          TAG_NAME="${VERSION}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG_NAME}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..${TAG_NAME} --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          CHANGELOG_JSON=$(printf '%s' "${CHANGELOG}" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          PAYLOAD=$(printf '{"tag_name":"%s","name":"v%s","body":%s,"draft":false,"prerelease":false}' \
            "${TAG_NAME}" "${VERSION}" "${CHANGELOG_JSON}")
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -d "${PAYLOAD}")
          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | head -n -1)
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "${HTTP_CODE}" = "201" ]; then
            echo "✅ Release v${VERSION} created"
          elif echo "${BODY}" | grep -q "already exists\|Release already exists"; then
            echo "⚠️ Release v${VERSION} already exists (expected on re-run)"
          else
            echo "❌ Failed to create release (HTTP ${HTTP_CODE})"
            exit 1
          fi
