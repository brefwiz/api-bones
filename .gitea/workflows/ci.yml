name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # ============================================================================
  # All checks run in parallel
  # ============================================================================

  fmt:
    name: Code Formatting
    runs-on: brefwiz
    container:
      image: harbor.brefwiz.com/brefwiz/rust-ci:rust-1.94
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: make ci-format

  clippy:
    name: Clippy Lints
    runs-on: brefwiz
    container:
      image: harbor.brefwiz.com/brefwiz/rust-ci:rust-1.94
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Rust registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: ${{ runner.os }}-cargo-clippy-
      - name: Run Clippy
        run: make ci-lint

  no-std:
    name: no_std Compilation
    runs-on: brefwiz
    container:
      image: harbor.brefwiz.com/brefwiz/rust-ci:rust-1.94
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Rust registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-no-std-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: ${{ runner.os }}-cargo-no-std-
      - name: Check no_std (core types only)
        run: cargo check --no-default-features
      - name: Check no_std + alloc
        run: cargo check --no-default-features --features alloc

  test:
    name: Tests
    runs-on: brefwiz
    container:
      image: harbor.brefwiz.com/brefwiz/rust-ci:rust-1.94
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Rust registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: ${{ runner.os }}-cargo-registry-
      - name: Run tests
        run: make ci-test

  coverage:
    name: Test Coverage (100%)
    runs-on: brefwiz
    container:
      image: harbor.brefwiz.com/brefwiz/rust-ci:rust-1.94
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Rust registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: ${{ runner.os }}-cargo-registry-
      - name: Check coverage
        run: make ci-coverage

  audit:
    name: Security Audit
    runs-on: brefwiz
    container:
      image: harbor.brefwiz.com/brefwiz/rust-ci:rust-1.94
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo-audit binary + advisory DB
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/advisory-db
          key: ${{ runner.os }}-cargo-audit-v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        run: cargo audit --db ~/.cargo/advisory-db

  # ============================================================================
  # Publish — waits for all checks, main branch only
  # ============================================================================

  publish-crate:
    name: Publish Crate to Forgejo Registry
    runs-on: brefwiz
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [fmt, clippy, no-std, test, coverage, audit]
    container:
      image: harbor.brefwiz.com/brefwiz/rust-ci:rust-1.94
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Rust registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: ${{ runner.os }}-cargo-publish-

      - name: Build
        run: cargo build --lib --release

      - name: Debug token
        env:
          CARGO_REGISTRIES_SALINGUE_TOKEN: "Bearer ${{ secrets.PACKAGE_PUBLISHER_TOKEN }}"
        run: |
          if [ -z "$CARGO_REGISTRIES_SALINGUE_TOKEN" ]; then
            echo "❌ PACKAGE_PUBLISHER_TOKEN secret is EMPTY or not set"
            exit 1
          else
            echo "✅ Token is present (length: ${#CARGO_REGISTRIES_SALINGUE_TOKEN})"
          fi

      - name: Publish crate
        env:
          CARGO_REGISTRIES_SALINGUE_TOKEN: "Bearer ${{ secrets.PACKAGE_PUBLISHER_TOKEN }}"
        run: |
          REGISTRY=$(grep -m1 '^\[registries' .cargo/config.toml | tr -d '[]' | cut -d. -f2)
          if ! cargo publish --registry "$REGISTRY" --allow-dirty 2>&1 | tee /tmp/publish.log; then
            if grep -q "already uploaded\|already exists" /tmp/publish.log; then
              echo "⚠️ Crate already published at this version (expected)"
              exit 0
            else
              echo "❌ Publish failed"
              cat /tmp/publish.log
              exit 1
            fi
          fi

      - name: Summary
        if: success()
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          REGISTRY=$(grep -m1 '^\[registries' .cargo/config.toml | tr -d '[]' | cut -d. -f2)
          echo "## 📦 Crate Published" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** \`shared-types\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`$REGISTRY\`" >> $GITHUB_STEP_SUMMARY
