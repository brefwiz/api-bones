name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # ============================================================================
  # STAGE 1: Fast Checks (parallel)
  # ============================================================================

  fmt:
    name: Code Formatting
    runs-on: ubuntu-latest
    container:
      image: harbor.mentalkube.local/brefwiz/rust-ci:latest
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-fmt-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: ${{ runner.os }}-cargo-fmt-

      - name: Check formatting
        run: make ci-format

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    container:
      image: harbor.mentalkube.local/brefwiz/rust-ci:latest
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: ${{ runner.os }}-cargo-clippy-

      - name: Run Clippy
        run: make ci-lint

  # ============================================================================
  # STAGE 2: Tests + Audit (needs stage 1)
  # ============================================================================

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    container:
      image: harbor.mentalkube.local/brefwiz/rust-ci:latest
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: make ci-test

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    container:
      image: harbor.mentalkube.local/brefwiz/rust-ci:latest
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-bin-v1

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cache cargo advisory database
        uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: cargo-advisory-db
          restore-keys: cargo-advisory-db

      - name: Run security audit
        run: make ci-audit

  # ============================================================================
  # STAGE 3: Publish (main push only, needs all checks)
  # ============================================================================

  publish-crate:
    name: Publish Crate to Forgejo Registry
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [fmt, clippy, test, audit]
    container:
      image: harbor.mentalkube.local/brefwiz/rust-ci:latest
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: ${{ runner.os }}-cargo-publish-


      - name: Build
        run: cargo build --lib --release

      - name: Publish crate
        run: |
          REGISTRY=$(grep -m1 '^\[registries' .cargo/config.toml | tr -d '[]' | cut -d. -f2)
          cargo login --registry "$REGISTRY" "Bearer $PACKAGE_PUBLISHER_TOKEN"
          if ! cargo publish --registry "$REGISTRY" --allow-dirty 2>&1 | tee /tmp/publish.log; then
            if grep -q "already uploaded\|already exists" /tmp/publish.log; then
              echo "⚠️ Crate already published at this version (expected)"
              exit 0
            else
              echo "❌ Publish failed"
              cat /tmp/publish.log
              exit 1
            fi
          fi

      - name: Summary
        if: success()
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          REGISTRY=$(grep -m1 '^\[registries' .cargo/config.toml | tr -d '[]' | cut -d. -f2)
          echo "## 📦 Crate Published" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** \`shared-types\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`$REGISTRY\`" >> $GITHUB_STEP_SUMMARY
