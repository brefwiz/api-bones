name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 1

jobs:
  # ============================================================================
  # STAGE 1: Fast Checks (parallel)
  # ============================================================================

  fmt:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ runner.os }}-rustup-stable-${{ hashFiles('**/rust-toolchain.toml') }}-v1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: make ci-format

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ runner.os }}-rustup-stable-${{ hashFiles('**/rust-toolchain.toml') }}-v1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-shared-types-v1"

      - name: Run Clippy
        run: make ci-lint

  # ============================================================================
  # STAGE 2: Tests (needs stage 1)
  # ============================================================================

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-shared-types-v1"
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run tests
        run: make ci-test

  audit:
    name: Security Audit (PLATFORM-008)
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-shared-types-v1"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: make ci-audit

  # ============================================================================
  # STAGE 3: Publish (main push only, needs all checks)
  # ============================================================================

  publish-crate:
    name: Publish Crate to Gitea Registry
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [fmt, clippy, test, audit]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-shared-types-v1"

      - name: Configure Gitea registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'CARGO_EOF'
          [registry]
          global-credential-providers = ["cargo:token"]

          [registries.gitea]
          index = "sparse+https://brefwiz.mentalmorph.com/api/packages/Brefwiz/cargo/"
          CARGO_EOF

      - name: Build
        run: cargo build --lib --release

      - name: Publish crate
        env:
          CARGO_REGISTRIES_GITEA_TOKEN: "Bearer ${{ secrets.PACKAGE_PUBLISHER_TOKEN }}"
        run: |
          if ! cargo publish --registry gitea --allow-dirty 2>&1 | tee /tmp/publish.log; then
            if grep -q "already uploaded\|already exists" /tmp/publish.log; then
              echo "⚠️ Crate already published at this version (expected)"
              exit 0
            else
              echo "❌ Publish failed"
              cat /tmp/publish.log
              exit 1
            fi
          fi

      - name: Summary
        if: success()
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "## 📦 Crate Published" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** \`shared-types\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** Gitea (Brefwiz)" >> $GITHUB_STEP_SUMMARY
