name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # ============================================================================
  # STAGE 1: Fast Checks (parallel)
  # ============================================================================

  fmt:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ runner.os }}-rustup-stable-${{ hashFiles('**/rust-toolchain.toml') }}-v1

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --component rustfmt
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Check formatting
        run: make ci-format

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust toolchain + registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --component clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run Clippy
        run: make ci-lint

  # ============================================================================
  # STAGE 2: Tests (needs stage 1)
  # ============================================================================

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust toolchain + registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run tests
        run: make ci-test

  audit:
    name: Security Audit (PLATFORM-008)
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust toolchain + cargo-audit
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
            ~/.cargo/bin/cargo-audit
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-cargo-audit-

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: make ci-audit

  # ============================================================================
  # STAGE 3: Publish (main push only, needs all checks)
  # ============================================================================

  publish-crate:
    name: Publish Crate to Forgejo Registry
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [fmt, clippy, test, audit]
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust toolchain + registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Configure Forgejo registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'CARGO_EOF'
          [registry]
          global-credential-providers = ["cargo:token"]

          [registries.mentalkube]
          index = "sparse+http://forgejo.mentalkube.local/api/packages/Brefwiz/cargo/"
          CARGO_EOF

      - name: Build
        run: cargo build --lib --release

      - name: Publish crate
        env:
          CARGO_REGISTRIES_MENTALKUBE_TOKEN: "Bearer ${{ secrets.PACKAGE_PUBLISHER_TOKEN }}"
        run: |
          if ! cargo publish --registry mentalkube --allow-dirty 2>&1 | tee /tmp/publish.log; then
            if grep -q "already uploaded\|already exists" /tmp/publish.log; then
              echo "⚠️ Crate already published at this version (expected)"
              exit 0
            else
              echo "❌ Publish failed"
              cat /tmp/publish.log
              exit 1
            fi
          fi

      - name: Summary
        if: success()
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "## 📦 Crate Published" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** \`shared-types\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** Forgejo (mentalkube)" >> $GITHUB_STEP_SUMMARY
