name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write

jobs:
  ci:
    uses: brefwiz/ci-workflows/.gitea/workflows/rust-ci.yml@main
    with:
      enable-no-std: true
      enable-feature-powerset: true
      feature-powerset-packages: "api-bones api-bones-tower api-bones-reqwest"
      feature-powerset-depth: "2"
      rust-min-stack: "16777216"
      enable-deny: true
      enable-auto-tag: true
    secrets: inherit
